<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Distribusi Aset</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.min.css">
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      font-family: 'Segoe UI', sans-serif;
    }
    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      color: white;
    }
    .left-panel .icon { font-size: 5rem; margin-bottom: 1.5rem; }
    .left-panel h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.75rem; text-align: center; }
    .left-panel p { font-size: 1rem; opacity: 0.8; text-align: center; max-width: 300px; line-height: 1.6; }
    .right-panel {
      width: 460px;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem;
      box-shadow: -10px 0 40px rgba(0,0,0,0.15);
    }
    .footer-text { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: #9ca3af; }
  </style>
</head>
<body>

  <!-- Kiri -->
  <div class="left-panel">
    <div class="icon">📦</div>
    <h1>Sistem Distribusi Aset</h1>
    <p>Kelola distribusi dan pengembalian aset peralatan secara efisien dan terstruktur.</p>
  </div>

  <!-- Kanan -->
  <div class="right-panel">
    <h2 style="font-size:1.75rem; font-weight:700; color:#1e3a5f; margin-bottom:0.4rem;">Selamat Datang</h2>
    <p style="color:#6b7280; font-size:0.95rem; margin-bottom:2rem;">Masuk ke akun Anda untuk melanjutkan</p>

    <div class="alert alert-destructive" id="errorBox" style="display:none; margin-bottom:1.25rem;">
      <span>⚠️ Email atau password salah. Silakan coba lagi.</span>
    </div>

    <form action="/login" method="POST">
      <div class="form-item" style="margin-bottom:1.25rem;">
        <label class="label" for="email">Email</label>
        <input
          class="input"
          type="email"
          id="email"
          name="email"
          placeholder="Masukkan email Anda"
          required
        >
      </div>

      <div class="form-item" style="margin-bottom:1.5rem;">
        <label class="label" for="password">Password</label>
        <input
          class="input"
          type="password"
          id="password"
          name="password"
          placeholder="Masukkan password Anda"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; padding:0.85rem;">
        Masuk →
      </button>
    </form>

    <p class="footer-text">©Sistem Distribusi Aset · Kelompok A3</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      document.getElementById('errorBox').style.display = 'block';
    }
  </script>

</body>
</html>
