<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Distribusi Aset</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
    }

    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      color: white;
    }

    .left-panel .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
    }

    .left-panel h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      text-align: center;
    }

    .left-panel p {
      font-size: 1rem;
      opacity: 0.8;
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
    }

    .right-panel {
      width: 460px;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem;
      box-shadow: -10px 0 40px rgba(0,0,0,0.15);
    }

    .right-panel h2 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1e3a5f;
      margin-bottom: 0.4rem;
    }

    .right-panel .subtitle {
      color: #6b7280;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper span {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: #9ca3af;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 0.75rem 0.75rem 2.5rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn-login:hover { opacity: 0.92; }
    .btn-login:active { transform: scale(0.98); }

    .footer-text {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="left-panel">
    <div class="icon">📦</div>
    <h1>Sistem Distribusi Aset</h1>
    <p>Kelola distribusi dan pengembalian aset peralatan secara efisien dan terstruktur.</p>
  </div>

  <div class="right-panel">
    <h2>Selamat Datang</h2>
    <p class="subtitle">Masuk ke akun Anda untuk melanjutkan</p>

    <div class="error-box" id="errorBox">
      ⚠️ Email atau password salah. Silakan coba lagi.
    </div>

    <form action="/login" method="POST">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <span>✉️</span>
          <input type="email" name="email" placeholder="Masukkan email Anda" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span>🔒</span>
          <input type="password" name="password" placeholder="Masukkan password Anda" required>
        </div>
      </div>

      <button type="submit" class="btn-login">Masuk →</button>
    </form>

    <p class="footer-text">© Sistem Distribusi Aset · Kelompok A3</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      document.getElementById('errorBox').style.display = 'block';
    }
  </script>

</body>
</html>
